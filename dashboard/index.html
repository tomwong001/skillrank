<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRank — Leaderboard</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--s1:#161926;--s2:#1E2235;--s3:#282D44;--tp:#E8E8F0;--ts:#9295AD;--tm:#5D6080;--ac:#22D3EE;--ac2:#818CF8;--ad:rgba(34,211,238,.10);--ag:rgba(34,211,238,.30);--ok:#34D399;--warn:#FBBF24;--err:#F87171;--bdr:#2A2E45;--r-sm:4px;--r-md:8px;--r-lg:12px;--fd:'Satoshi',system-ui,sans-serif;--fb:'Geist',system-ui,sans-serif;--fm:'Geist Mono','SF Mono',monospace}
[data-theme=light]{--bg:#F5F5F7;--s1:#FFF;--s2:#F0F0F3;--s3:#E5E5EA;--tp:#1A1A2E;--ts:#6B6B80;--tm:#9999AA;--ac:#0891B2;--ac2:#6366F1;--ad:rgba(8,145,178,.08);--ag:rgba(8,145,178,.15);--bdr:#D5D5DD}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tp);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(34,211,238,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(129,140,248,.05) 0%,transparent 60%);pointer-events:none;z-index:0;animation:bgS 20s ease-in-out infinite alternate}
@keyframes bgS{0%{opacity:1;transform:translate(0,0)}50%{opacity:.7;transform:translate(-20px,10px) scale(1.05)}100%{opacity:1;transform:translate(10px,-15px)}}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
nav{background:rgba(22,25,38,.80);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:8px 0;position:sticky;top:0;z-index:100}
nav .wrap{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--fd);font-weight:700;font-size:20px;color:var(--tp);letter-spacing:-.02em;text-decoration:none}
.logo span{color:var(--ac)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{color:var(--ts);text-decoration:none;font-size:13px;font-weight:500;transition:color .15s}
.nav-links a:hover,.nav-links a.active{color:var(--tp)}
.tbtn{background:var(--s2);border:1px solid var(--bdr);color:var(--ts);padding:6px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-family:var(--fm)}

.hero{padding:64px 0 48px;text-align:center}
.hero h1{font-family:var(--fd);font-weight:700;font-size:48px;letter-spacing:-.04em;line-height:1.1;margin-bottom:16px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--ts);font-size:17px;max-width:560px;margin:0 auto 24px;line-height:1.6}
.hero-btns{display:flex;justify-content:center;gap:8px}
.btn{padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;font-family:var(--fb);cursor:pointer;border:1px solid transparent;transition:all .15s;text-decoration:none;display:inline-block}
.btn-p{background:var(--ac);color:#0F1117;border-color:var(--ac)}
.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:var(--s2);color:var(--tp);border-color:var(--bdr)}
.stats{display:flex;justify-content:center;gap:48px;margin-top:24px}
.stat-v{font-family:var(--fm);font-size:28px;font-weight:500;color:var(--ac);font-variant-numeric:tabular-nums}
.stat-l{font-size:12px;color:var(--tm);font-family:var(--fm);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.lb{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.2);margin-bottom:48px}
.lb-head{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--bdr)}
.lb-t{font-family:var(--fd);font-weight:600;font-size:16px}
.lb-tag{font-family:var(--fm);font-size:12px;color:var(--ac);background:var(--ad);padding:2px 8px;border-radius:var(--r-sm)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 16px;font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;font-family:var(--fm);border-bottom:1px solid var(--bdr);cursor:pointer}
th:hover{color:var(--ts)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--bdr)}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--s2)}
tr.top{background:var(--ad)}
tr.top:hover{background:rgba(34,211,238,.16)}
.rk{font-family:var(--fm);font-weight:500;color:var(--tm);width:48px}
.rk-1{color:var(--ac);text-shadow:0 0 12px var(--ag)}
.sn{font-weight:500}
.sa{color:var(--ts);font-size:12px}
.rt{font-family:var(--fm);font-weight:500;font-variant-numeric:tabular-nums}
.ci{font-family:var(--fm);font-size:11px;color:var(--tm);font-variant-numeric:tabular-nums}
.wr{font-family:var(--fm);font-variant-numeric:tabular-nums}
.wr-h{color:var(--ok)}.wr-m{color:var(--tp)}.wr-l{color:var(--err)}
.ed{font-family:var(--fm);font-size:12px;color:var(--tm)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;font-family:var(--fm)}
.badge-ok{background:rgba(52,211,153,.12);color:var(--ok)}
.badge-ac{background:var(--ad);color:var(--ac)}

.empty{text-align:center;padding:64px 24px;color:var(--ts)}
.empty h2{font-family:var(--fd);font-size:24px;color:var(--tp);margin-bottom:8px}
.empty p{max-width:400px;margin:0 auto 24px}

.foot{padding:48px 0;text-align:center;color:var(--tm);font-size:12px;font-family:var(--fm)}
.glow-1,.glow-2{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:.5;animation:orb 15s ease-in-out infinite alternate;z-index:0}
.glow-1{width:300px;height:300px;background:rgba(34,211,238,.08);top:-100px;left:-50px}
.glow-2{width:250px;height:250px;background:rgba(129,140,248,.06);bottom:20%;right:-80px;animation-delay:-7s}
@keyframes orb{0%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-15px,25px)}100%{transform:translate(20px,-10px)}}
@media(max-width:768px){.hero h1{font-size:32px}.stats{gap:24px}.stat-v{font-size:20px}}
#loading{display:none;text-align:center;padding:32px;color:var(--ts);font-family:var(--fm)}
.intent-selector{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r-md)}
.intent-selector label{font-family:var(--fm);font-size:12px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em}
.intent-selector select{background:var(--s2);border:1px solid var(--bdr);color:var(--tp);padding:6px 10px;border-radius:var(--r-sm);font-family:var(--fm);font-size:13px;cursor:pointer;min-width:260px}
.intent-selector select:hover{border-color:var(--ac)}
.intent-selector select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px var(--ad)}
</style>
</head>
<body>
<div class="glow-1"></div><div class="glow-2"></div>
<nav><div class="wrap">
  <a href="/" class="logo">Skill<span>Rank</span></a>
  <div class="nav-links">
    <a href="/" class="active">Leaderboard</a>
    <a href="/submit">Submit</a>
    <a href="/api/health">API</a>
    <button class="tbtn" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'">&#9684; theme</button>
  </div>
</div></nav>

<div class="wrap">
  <div class="hero">
    <h1>Rank Every Skill.<br><em>Trust Every Choice.</em></h1>
    <p>Pairwise A/B evaluation with LLM judges. Submit your AI skill, get ranked against the field. Agents pick the best tool automatically.</p>
    <div class="hero-btns">
      <a href="/submit" class="btn btn-p" style="padding:10px 24px;font-size:14px">Submit a Skill</a>
      <a href="#leaderboard" class="btn btn-s" style="padding:10px 24px;font-size:14px">View Leaderboard</a>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="intent-selector" id="intent-selector-wrap">
    <label for="intent-select">Intent:</label>
    <select id="intent-select"></select>
  </div>

  <div id="leaderboard"></div>
  <div id="loading">Loading leaderboard...</div>
</div>

<div class="foot">SkillRank v0.1.0</div>

<script>
const API = window.location.origin;
let currentIntent = null;

async function loadIntents() {
  const resp = await fetch(`${API}/api/intents`);
  const data = await resp.json();
  return data.intents || [];
}

async function loadLeaderboard(intent) {
  const el = document.getElementById('leaderboard');
  const loading = document.getElementById('loading');
  const statsEl = document.getElementById('stats');
  loading.style.display = 'block';

  try {
    const resp = await fetch(`${API}/api/skills?intent=${encodeURIComponent(intent)}`);
    const data = await resp.json();
    loading.style.display = 'none';

    // Stats
    statsEl.innerHTML = `
      <div><div class="stat-v">${data.total}</div><div class="stat-l">Skills Ranked</div></div>
      <div><div class="stat-v">${intent.replace(/_/g, ' ')}</div><div class="stat-l">Intent</div></div>
    `;

    if (!data.skills || data.skills.length === 0) {
      el.innerHTML = `<div class="empty"><h2>No skills yet</h2><p>Be the first to submit a skill for evaluation.</p><a href="/submit" class="btn btn-p">Submit a Skill</a></div>`;
      return;
    }

    let rows = '';
    data.skills.forEach((s, i) => {
      const wrClass = s.win_rate >= 0.7 ? 'wr-h' : s.win_rate >= 0.4 ? 'wr-m' : 'wr-l';
      const topClass = i === 0 ? ' top' : '';
      const rkClass = i === 0 ? ' rk-1' : '';
      const trusted = s.trusted ? '<span class="badge badge-ok">trusted</span>' : '<span class="badge badge-ac">new</span>';
      rows += `<tr class="${topClass}">
        <td class="rk${rkClass}">${s.rank}</td>
        <td><span class="sn">${s.skill_id}</span><br><span class="sa">@${s.author}</span></td>
        <td class="rt" ${i===0?'style="color:var(--ac)"':''}>${s.rating}</td>
        <td class="ci">&plusmn;${s.confidence_95}</td>
        <td class="wr ${wrClass}">${(s.win_rate*100).toFixed(1)}%</td>
        <td class="ed">${trusted}</td>
      </tr>`;
    });

    el.innerHTML = `<div class="lb" id="lb-table">
      <div class="lb-head"><div class="lb-t">Intent Rankings</div><div class="lb-tag">${intent}</div></div>
      <table><thead><tr><th>#</th><th>Skill</th><th>Rating &#8595;</th><th>95% CI</th><th>Win Rate</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  } catch (e) {
    loading.style.display = 'none';
    el.innerHTML = `<div class="empty"><h2>API unavailable</h2><p>${e.message}</p></div>`;
  }
}

async function init() {
  const intents = await loadIntents();
  if (intents.length === 0) {
    document.getElementById('leaderboard').innerHTML = `<div class="empty"><h2>No intents yet</h2><p>Be the first to submit a skill.</p><a href="/submit" class="btn btn-p">Submit a Skill</a></div>`;
    return;
  }
  // Render intent selector
  const sel = document.getElementById('intent-select');
  intents.forEach(i => {
    const opt = document.createElement('option');
    opt.value = i.id;
    opt.textContent = `${i.id.replace(/_/g, ' ')} (${i.count})`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    currentIntent = e.target.value;
    loadLeaderboard(currentIntent);
  });
  currentIntent = intents[0].id;
  sel.value = currentIntent;
  loadLeaderboard(currentIntent);
}

init();
</script>
</body>
</html>
