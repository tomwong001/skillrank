<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRank — Scorecard</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--s1:#161926;--s2:#1E2235;--s3:#282D44;--tp:#E8E8F0;--ts:#9295AD;--tm:#5D6080;--ac:#22D3EE;--ac2:#818CF8;--ad:rgba(34,211,238,.10);--ag:rgba(34,211,238,.30);--ok:#34D399;--warn:#FBBF24;--err:#F87171;--bdr:#2A2E45;--r-sm:4px;--r-md:8px;--r-lg:12px;--fd:'Satoshi',system-ui,sans-serif;--fb:'Geist',system-ui,sans-serif;--fm:'Geist Mono','SF Mono',monospace}
[data-theme=light]{--bg:#F5F5F7;--s1:#FFF;--s2:#F0F0F3;--s3:#E5E5EA;--tp:#1A1A2E;--ts:#6B6B80;--tm:#9999AA;--ac:#0891B2;--ac2:#6366F1;--ad:rgba(8,145,178,.08);--ag:rgba(8,145,178,.15);--bdr:#D5D5DD}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tp);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(34,211,238,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.wrap{max-width:560px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
nav{background:rgba(22,25,38,.80);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:8px 0;position:sticky;top:0;z-index:100}
nav .inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--fd);font-weight:700;font-size:20px;color:var(--tp);letter-spacing:-.02em;text-decoration:none}
.logo span{color:var(--ac)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{color:var(--ts);text-decoration:none;font-size:13px;font-weight:500;transition:color .15s}
.nav-links a:hover{color:var(--tp)}
.tbtn{background:var(--s2);border:1px solid var(--bdr);color:var(--ts);padding:6px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-family:var(--fm)}

.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:32px;margin:48px 0;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(34,211,238,.06),0 8px 32px rgba(0,0,0,.3);transition:box-shadow .3s,border-color .3s}
.sc:hover{border-color:rgba(34,211,238,.3);box-shadow:0 0 60px rgba(34,211,238,.12),0 8px 32px rgba(0,0,0,.4)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac),var(--ac2),transparent)}
.sc::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(34,211,238,.04) 0%,transparent 70%);pointer-events:none}

.sc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.sc-name{font-family:var(--fd);font-weight:700;font-size:24px}
.sc-author{color:var(--ts);font-size:13px;margin-top:2px}
.sc-rb{text-align:right}
.sc-rating{font-family:var(--fm);font-size:40px;font-weight:500;color:var(--ac);font-variant-numeric:tabular-nums;line-height:1}
.sc-rank{font-family:var(--fm);font-size:12px;color:var(--tm)}

.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:var(--s2);border-radius:var(--r-sm);padding:16px}
.metric-l{font-family:var(--fm);font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em}
.metric-v{font-family:var(--fm);font-size:20px;font-weight:500;margin-top:4px;font-variant-numeric:tabular-nums}

.sec-t{font-family:var(--fm);font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:20px}
.str,.weak{font-size:13px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.str{color:var(--ac)}.weak{color:var(--tm)}

.scenarios{margin-top:20px}
.scenario{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.scenario:last-child{border-bottom:none}
.sc-ok{color:var(--ok)}.sc-fail{color:var(--err)}.sc-skip{color:var(--tm)}

.sc-foot{margin-top:24px;padding-top:16px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.sc-intent,.sc-date{font-family:var(--fm);font-size:11px;color:var(--tm)}

.back{margin-top:24px;text-align:center}
.back a{color:var(--ac);text-decoration:none;font-size:13px}
.back a:hover{text-decoration:underline}

.loading{text-align:center;padding:64px;color:var(--ts);font-family:var(--fm)}
.foot{padding:48px 0;text-align:center;color:var(--tm);font-size:12px;font-family:var(--fm)}
</style>
</head>
<body>
<nav><div class="inner">
  <a href="/" class="logo">Skill<span>Rank</span></a>
  <div class="nav-links">
    <a href="/">Leaderboard</a>
    <a href="/submit">Submit</a>
    <a href="/api/health">API</a>
    <button class="tbtn" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'">&#9684; theme</button>
  </div>
</div></nav>

<div class="wrap">
  <div id="content"><div class="loading">Loading scorecard...</div></div>
  <div class="back"><a href="/">← Back to Leaderboard</a></div>
</div>
<div class="foot">SkillRank v0.1.0</div>

<script>
const API = window.location.origin;
const skillId = window.location.pathname.replace('/skill/', '');

async function loadScorecard() {
  const el = document.getElementById('content');
  try {
    // Try to find this skill's latest submission
    const resp = await fetch(`${API}/api/skills?intent=ship_code`);
    const data = await resp.json();
    const skill = data.skills?.find(s => s.skill_id === decodeURIComponent(skillId));

    if (!skill) {
      el.innerHTML = '<div class="loading">Skill not found. It may still be evaluating.</div>';
      return;
    }

    const wr = (skill.win_rate * 100).toFixed(1);
    const wrColor = skill.win_rate >= 0.7 ? 'var(--ok)' : skill.win_rate >= 0.4 ? 'var(--tp)' : 'var(--err)';
    const rank = skill.rank;
    const total = data.total;

    el.innerHTML = `
    <div class="sc">
      <div class="sc-head">
        <div>
          <div class="sc-name">${skill.skill_id}</div>
          <div class="sc-author">by @${skill.author}</div>
        </div>
        <div class="sc-rb">
          <div class="sc-rating">${skill.rating}</div>
          <div class="sc-rank">#${rank} of ${total}</div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-l">Win Rate</div>
          <div class="metric-v" style="color:${wrColor}">${wr}%</div>
        </div>
        <div class="metric">
          <div class="metric-l">Comparisons</div>
          <div class="metric-v">${skill.comparisons}</div>
        </div>
        <div class="metric">
          <div class="metric-l">Confidence</div>
          <div class="metric-v">&plusmn;${skill.confidence_95}</div>
        </div>
      </div>
      <div class="sec-t">Status</div>
      <div style="font-size:13px;color:${skill.trusted?'var(--ok)':'var(--ac)'}">
        ${skill.trusted ? '✓ Trusted (10+ comparisons)' : '⟳ New (needs more comparisons for trusted badge)'}
      </div>
      <div class="sc-foot">
        <div class="sc-intent">intent: ship_code</div>
        <div class="sc-date">commit: ${skill.commit_sha}</div>
      </div>
    </div>`;

    document.title = `SkillRank — ${skill.skill_id}`;
  } catch (e) {
    el.innerHTML = `<div class="loading">Error loading scorecard: ${e.message}</div>`;
  }
}

loadScorecard();
</script>
</body>
</html>
