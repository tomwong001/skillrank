# fly.toml — SkillRank API on Fly.io
# Deploy: fly deploy
# Single instance (SQLite requires it)

app = "skillrank"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  SKILLRANK_DB = "/data/skillrank.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "skillrank_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
